<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑百校-奖品兑换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            margin-top: 10px;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .info-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-item .label {
            color: #999;
        }
        .info-item .value {
            font-weight: 600;
            color: #333;
        }
        .info-item .value.highlight {
            color: #667eea;
            font-size: 20px;
        }
        .prize-list {
            margin: 20px 0;
        }
        .prize-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .prize-item:hover {
            border-color: #667eea;
        }
        .prize-item.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        .prize-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .prize-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            accent-color: #667eea;
        }
        .prize-info {
            flex: 1;
        }
        .prize-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .prize-meta {
            font-size: 12px;
            color: #999;
        }
        .prize-points {
            font-weight: 600;
            color: #667eea;
        }
        .prize-quantity {
            display: flex;
            align-items: center;
            margin-left: 15px;
        }
        .prize-quantity button {
            width: 28px;
            height: 28px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .prize-quantity button:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }
        .prize-quantity button:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
        }
        .prize-quantity span {
            min-width: 30px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0 8px;
        }
        .cart-summary {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .cart-summary h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item-name {
            color: #666;
        }
        .cart-item-subtotal {
            color: #667eea;
            font-weight: 600;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            padding-top: 10px;
            margin-top: 10px;
            border-top: 2px solid #ddd;
            font-size: 16px;
            font-weight: 600;
        }
        .cart-total-points {
            color: #667eea;
        }
        .cart-insufficient {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        .result {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .config-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .config-section h4 {
            color: #856404;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .config-section p {
            font-size: 12px;
            color: #856404;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎁 跑百校-奖品兑换</h1>
            <p>用积分兑换心仪奖品</p>
        </div>
        <div class="content">
            <div class="config-section" id="configSection">
                <h4>⚙️ 首次使用请先配置</h4>
                <div class="form-group">
                    <label>App ID</label>
                    <input type="text" id="appId" placeholder="cli_xxx">
                </div>
                <div class="form-group">
                    <label>App Secret</label>
                    <input type="password" id="appSecret" placeholder="输入 App Secret">
                </div>
                <button class="btn btn-secondary" onclick="saveConfig()">保存配置</button>
                <p style="font-size: 11px; color: #856404; margin-top: 10px;">配置将保存在本地浏览器中</p>
            </div>

            <div id="querySection" style="display: none;">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="userName" placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>手机后四位</label>
                    <input type="text" id="phoneLast4" placeholder="请输入手机号后四位" maxlength="4">
                </div>
                <button class="btn btn-primary" id="queryBtn" onclick="queryPoints()">查询积分</button>
            </div>

            <div id="loadingSection" class="loading" style="display: none;">
                <p>加载中...</p>
            </div>

            <div id="resultSection" style="display: none;">
                <div class="info-card">
                    <h3>📊 我的积分</h3>
                    <div class="info-item">
                        <span class="label">累计总积分</span>
                        <span class="value" id="totalPoints">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">当前可用积分</span>
                        <span class="value highlight" id="availablePoints">-</span>
                    </div>
                </div>

                <div class="prize-list" id="prizeList">
                    <h3 style="margin-bottom: 15px; color: #333;">🎁 可兑换奖品（可多选）</h3>
                    <div id="prizeItems"></div>
                </div>

                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <h4>🛒 已选奖品</h4>
                    <div id="cartItems"></div>
                    <div class="cart-total">
                        <span>合计消耗</span>
                        <span class="cart-total-points" id="cartTotalPoints">0 积分</span>
                    </div>
                    <div id="cartHint" class="cart-insufficient" style="display: none;"></div>
                </div>

                <button class="btn btn-primary" id="redeemBtn" onclick="redeemPrize()" disabled>请选择奖品</button>

                <div class="result" id="resultMessage"></div>
            </div>

            <button class="btn btn-secondary" id="resetBtn" style="display: none;" onclick="resetPage()">重新查询</button>
        </div>
    </div>

    <script>
        // 配置
        const BASE_TOKEN = 'NJaQbVxxgaI6Hds3yKWcGnY6nCm';
        const TABLE_ID = 'tblGAMiI17T24yJt';
        const REDEEM_TABLE_ID = 'tblwDXswRj96hCHg';
        const PRIZE_TABLE_ID = 'tblvCgkqjILnNyy3';
        const EXCHANGE_RECORD_TABLE_ID = 'tbl2w04Y50u7uSaj';

        let appId = localStorage.getItem('feishu_app_id') || '';
        let appSecret = localStorage.getItem('feishu_app_secret') || '';
        let accessToken = '';
        let currentUserRecord = null;
        let prizeList = [];
        // 已选奖品：{ index: quantity }
        let selectedPrizes = {};

        // 初始化
        function init() {
            if (appId && appSecret) {
                document.getElementById('appId').value = appId;
                document.getElementById('appSecret').value = appSecret;
                document.getElementById('configSection').style.display = 'none';
                document.getElementById('querySection').style.display = 'block';
            }
        }

        // 保存配置
        function saveConfig() {
            appId = document.getElementById('appId').value.trim();
            appSecret = document.getElementById('appSecret').value.trim();
            if (!appId || !appSecret) {
                alert('请输入 App ID 和 App Secret');
                return;
            }
            localStorage.setItem('feishu_app_id', appId);
            localStorage.setItem('feishu_app_secret', appSecret);
            document.getElementById('configSection').style.display = 'none';
            document.getElementById('querySection').style.display = 'block';
            alert('配置已保存！');
        }

        // 是否使用代理
        const USE_PROXY = true;
        const PROXY_URL = '/.netlify/functions/proxy';

        // 获取 tenant_access_token
        async function getAccessToken() {
            const url = 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal';
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ app_id: appId, app_secret: appSecret })
            });
            const data = await response.json();
            if (data.code !== 0) {
                throw new Error('获取访问令牌失败: ' + data.msg);
            }
            return data.tenant_access_token;
        }

        // API请求封装
        async function feishuApiRequest(path, method = 'POST', body = null, token = null) {
            if (USE_PROXY) {
                const headers = {};
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, method, headers, body })
                });
                return response.json();
            } else {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const response = await fetch(`https://open.feishu.cn/open-apis/${path}`, {
                    method,
                    headers,
                    body: body ? JSON.stringify(body) : undefined
                });
                return response.json();
            }
        }

        // 直接获取token（不经过代理）
        async function getAccessTokenDirect() {
            const url = 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal';
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ app_id: appId, app_secret: appSecret })
            });
            const data = await response.json();
            if (data.code !== 0) {
                throw new Error('获取访问令牌失败: ' + data.msg);
            }
            return data.tenant_access_token;
        }

        // 获取手机后四位
        function getPhoneLast4(phoneField) {
            if (!phoneField) return '';
            if (typeof phoneField === 'string') return phoneField;
            if (Array.isArray(phoneField) && phoneField.length > 0) {
                return phoneField[0].text || '';
            }
            return '';
        }

        // 查询积分
        async function queryPoints() {
            const name = document.getElementById('userName').value.trim();
            const phoneLast4 = document.getElementById('phoneLast4').value.trim();

            if (!name || !phoneLast4) {
                alert('请输入姓名和手机后四位');
                return;
            }

            document.getElementById('querySection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'block';

            try {
                const data = await feishuApiRequest(
                    'auth/v3/tenant_access_token/internal',
                    'POST',
                    { app_id: appId, app_secret: appSecret }
                );
                if (data.code !== 0) {
                    throw new Error('获取访问令牌失败: ' + data.msg);
                }
                accessToken = data.tenant_access_token;

                // 查询用户记录
                const record = await findUserRecord(name, phoneLast4);
                if (!record) {
                    showError('未找到该用户信息，请确认姓名和手机号是否正确');
                    return;
                }

                currentUserRecord = record;

                // 获取积分信息
                document.getElementById('totalPoints').textContent = record.fields['累计总积分'] || 0;
                document.getElementById('availablePoints').textContent = record.fields['当前可用积分'] || 0;

                // 加载奖品列表
                await loadPrizeList(record.fields['当前可用积分'] || 0);

                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('resetBtn').style.display = 'block';

            } catch (error) {
                showError(error.message);
            }
        }

        // 查找用户记录
        async function findUserRecord(name, phoneLast4) {
            // 先获取所有记录
            const data = await feishuApiRequest(
                `bitable/v1/apps/${BASE_TOKEN}/tables/${TABLE_ID}/records?page_size=500`,
                'GET',
                null,
                accessToken
            );

            if (data.code !== 0) {
                throw new Error('查询失败: ' + data.msg);
            }

            // 过滤匹配的用户
            const matchedRecords = data.data.items.filter(item => {
                const recordName = item.fields['姓名'] || '';
                const phoneField = item.fields['手机后四位'];
                let recordPhoneLast4 = '';
                if (Array.isArray(phoneField) && phoneField.length > 0) {
                    recordPhoneLast4 = phoneField[0].text || '';
                } else if (typeof phoneField === 'string') {
                    recordPhoneLast4 = phoneField;
                }
                return recordName === name && recordPhoneLast4 === phoneLast4;
            });

            if (matchedRecords.length === 0) {
                return null;
            }

            // 查找当前可用积分最高的记录
            let bestRecord = null;
            let maxPoints = -1;
            for (const item of matchedRecords) {
                const available = item.fields['当前可用积分'] || 0;
                if (available > maxPoints) {
                    maxPoints = available;
                    bestRecord = item;
                }
            }
            return bestRecord;
        }

        // 加载奖品列表
        async function loadPrizeList(userPoints) {
            const data = await feishuApiRequest(
                `bitable/v1/apps/${BASE_TOKEN}/tables/${PRIZE_TABLE_ID}/records?page_size=100`,
                'GET',
                null,
                accessToken
            );

            if (data.code !== 0) {
                throw new Error('加载奖品列表失败: ' + data.msg);
            }

            prizeList = data.data.items.filter(item => {
                const isEnabled = item.fields['是否上架'] === true;
                const remainingStock = (item.fields['库存数量'] || 0) - (item.fields['已兑数量'] || 0);
                return isEnabled && remainingStock > 0;
            });

            const container = document.getElementById('prizeItems');
            container.innerHTML = '';

            if (prizeList.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">暂无可兑换奖品</p>';
                return;
            }

            prizeList.forEach((item, index) => {
                const name = item.fields['奖品名称'] || '';
                const points = item.fields['所需积分'] || 0;
                const stock = (item.fields['库存数量'] || 0) - (item.fields['已兑数量'] || 0);
                const canRedeem = userPoints >= points && stock > 0;

                const div = document.createElement('div');
                div.className = 'prize-item' + (canRedeem ? '' : ' disabled');
                div.id = 'prize-' + index;
                div.innerHTML = `
                    <input type="checkbox" name="prize" value="${index}" ${canRedeem ? '' : 'disabled'} onclick="togglePrize(${index})">
                    <div class="prize-info">
                        <div class="prize-name">${name}</div>
                        <div class="prize-meta">剩余 ${stock} 件</div>
                    </div>
                    <div class="prize-points">${points} 积分</div>
                    <div class="prize-quantity" id="qty-controls-${index}" style="display: none;">
                        <button onclick="changeQuantity(${index}, -1)">−</button>
                        <span id="qty-value-${index}">1</span>
                        <button onclick="changeQuantity(${index}, 1)">+</button>
                    </div>
                `;

                container.appendChild(div);
            });

            updateCartUI();
        }

        // 切换奖品选中状态
        function togglePrize(index) {
            const checkbox = document.querySelector(`input[name="prize"][value="${index}"]`);
            const qtyControls = document.getElementById('qty-controls-' + index);
            const prizeItem = document.getElementById('prize-' + index);

            if (checkbox.checked) {
                selectedPrizes[index] = 1;
                qtyControls.style.display = 'flex';
                prizeItem.classList.add('selected');
            } else {
                delete selectedPrizes[index];
                qtyControls.style.display = 'none';
                prizeItem.classList.remove('selected');
            }

            updateCartUI();
        }

        // 修改单个奖品数量
        function changeQuantity(index, delta) {
            const prize = prizeList[index];
            const userPoints = parseInt(currentUserRecord.fields['当前可用积分']) || 0;
            const prizePoints = parseInt(prize.fields['所需积分']) || 0;
            const stock = (prize.fields['库存数量'] || 0) - (prize.fields['已兑数量'] || 0);

            // 计算当前总消耗
            let currentTotal = 0;
            for (const [idx, qty] of Object.entries(selectedPrizes)) {
                currentTotal += parseInt(prizeList[idx].fields['所需积分']) || 0;
            }

            // 移除当前奖品的消耗
            const currentQty = selectedPrizes[index] || 1;
            const currentPrizeTotal = prizePoints * currentQty;
            const availableForThis = userPoints - (currentTotal - currentPrizeTotal);

            const maxByPoints = Math.floor(availableForThis / prizePoints);
            const maxByStock = stock;
            const maxQty = Math.max(1, Math.min(maxByPoints, maxByStock));

            const newQty = Math.max(1, Math.min(maxQty, currentQty + delta));
            selectedPrizes[index] = newQty;

            document.getElementById('qty-value-' + index).textContent = newQty;

            // 更新按钮状态
            const buttons = document.querySelectorAll('#qty-controls-' + index + ' button');
            buttons[0].disabled = newQty <= 1;
            buttons[1].disabled = newQty >= maxQty;

            updateCartUI();
        }

        // 更新购物车UI
        function updateCartUI() {
            const userPoints = parseInt(currentUserRecord.fields['当前可用积分']) || 0;
            const cartSummary = document.getElementById('cartSummary');
            const cartItems = document.getElementById('cartItems');
            const cartTotalPoints = document.getElementById('cartTotalPoints');
            const cartHint = document.getElementById('cartHint');
            const redeemBtn = document.getElementById('redeemBtn');

            const selectedIndices = Object.keys(selectedPrizes);

            if (selectedIndices.length === 0) {
                cartSummary.style.display = 'none';
                redeemBtn.disabled = true;
                redeemBtn.textContent = '请选择奖品';
                return;
            }

            cartSummary.style.display = 'block';
            cartItems.innerHTML = '';

            let totalPoints = 0;
            let totalQuantity = 0;

            selectedIndices.forEach(idx => {
                const prize = prizeList[idx];
                const qty = selectedPrizes[idx];
                const points = parseInt(prize.fields['所需积分']) || 0;
                const subtotal = points * qty;
                totalPoints += subtotal;
                totalQuantity += qty;

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <span class="cart-item-name">${prize.fields['奖品名称']} × ${qty}</span>
                    <span class="cart-item-subtotal">${subtotal} 积分</span>
                `;
                cartItems.appendChild(div);
            });

            cartTotalPoints.textContent = totalPoints + ' 积分';

            if (totalPoints > userPoints) {
                cartHint.textContent = '积分不足，当前可用 ' + userPoints + ' 积分，合计需要 ' + totalPoints + ' 积分';
                cartHint.style.display = 'block';
                redeemBtn.disabled = true;
                redeemBtn.textContent = '积分不足';
            } else {
                cartHint.style.display = 'none';
                redeemBtn.disabled = false;
                redeemBtn.textContent = `兑换 ${totalQuantity} 件奖品（${totalPoints} 积分）`;
            }
        }

        // 兑换奖品
        async function redeemPrize() {
            const selectedIndices = Object.keys(selectedPrizes);
            if (selectedIndices.length === 0 || !currentUserRecord) {
                alert('请先选择奖品');
                return;
            }

            const userPoints = parseInt(currentUserRecord.fields['当前可用积分']) || 0;

            // 计算总消耗
            let totalPoints = 0;
            const prizeUpdates = []; // [{index, quantity, record_id}]

            for (const idx of selectedIndices) {
                const prize = prizeList[idx];
                const qty = selectedPrizes[idx];
                const points = parseInt(prize.fields['所需积分']) || 0;
                const subtotal = points * qty;
                const stock = (prize.fields['库存数量'] || 0) - (prize.fields['已兑数量'] || 0);

                if (stock < qty) {
                    showResult('error', `「${prize.fields['奖品名称']}」库存不足`);
                    return;
                }

                totalPoints += subtotal;
                prizeUpdates.push({ idx, quantity: qty, record_id: prize.record_id });
            }

            if (totalPoints > userPoints) {
                showResult('error', '积分不足，无法兑换');
                return;
            }

            const btn = document.getElementById('redeemBtn');
            btn.disabled = true;
            btn.textContent = '兑换中...';

            try {
                // 获取当前时间
                const now = new Date();
                const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

                // 构建兑换记录（列出每个奖品和数量）
                let exchangeRecordParts = [];
                for (const { idx, quantity } of prizeUpdates) {
                    const prize = prizeList[idx];
                    const points = parseInt(prize.fields['所需积分']) || 0;
                    exchangeRecordParts.push(`${prize.fields['奖品名称']} × ${quantity}`);
                }
                const exchangeRecord = `【兑换】${exchangeRecordParts.join('、')} - ${totalPoints}积分 - ${dateStr}`;

                // 获取现有兑换记录
                const existingRecord = currentUserRecord.fields['兑换记录'] || '';
                const newRecord = existingRecord ? existingRecord + '\n' + exchangeRecord : exchangeRecord;

                // 计算新的兑换消耗积分（累加，而非覆盖）
                const currentExchangePoints = parseInt(currentUserRecord.fields['兑换消耗积分']) || 0;
                const newExchangePoints = currentExchangePoints + totalPoints;

                // 更新用户积分记录
                const updateResult = await feishuApiRequest(
                    `bitable/v1/apps/${BASE_TOKEN}/tables/${TABLE_ID}/records/batch_update`,
                    'POST',
                    {
                        records: [{
                            record_id: currentUserRecord.record_id,
                            fields: {
                                '兑换记录': newRecord,
                                '兑换消耗积分': parseInt(newExchangePoints) || 0
                            }
                        }]
                    },
                    accessToken
                );

                if (updateResult.code !== 0) {
                    throw new Error('兑换失败: ' + updateResult.msg);
                }

                // 更新各奖品表的已兑数量
                for (const { record_id, quantity } of prizeUpdates) {
                    const prize = prizeList.find(p => p.record_id === record_id);
                    const currentRedeemed = parseInt(prize.fields['已兑数量']) || 0;
                    await feishuApiRequest(
                        `bitable/v1/apps/${BASE_TOKEN}/tables/${PRIZE_TABLE_ID}/records/batch_update`,
                        'POST',
                        {
                            records: [{
                                record_id: record_id,
                                fields: {
                                    '已兑数量': currentRedeemed + quantity
                                }
                            }]
                        },
                        accessToken
                    );
                }

                // 创建兑换记录（每种奖品一条记录）
                for (const { idx, quantity } of prizeUpdates) {
                    const prize = prizeList[idx];
                    const prizeName = prize.fields['奖品名称'] || '';
                    const userName = currentUserRecord.fields['姓名'] || '';
                    const phoneLast4 = getPhoneLast4(currentUserRecord.fields['手机后四位']);

                    const recordResult = await feishuApiRequest(
                        `bitable/v1/apps/${BASE_TOKEN}/tables/${EXCHANGE_RECORD_TABLE_ID}/records/batch_create`,
                        'POST',
                        {
                            fields: ['姓名', '手机尾号', '兑换奖品', '兑换数量', '兑换时间'],
                            rows: [[userName, phoneLast4, prizeName, quantity, dateStr]]
                        },
                        accessToken
                    );

                    if (recordResult.code !== 0) {
                        console.error('创建兑换记录失败:', recordResult.msg);
                    }
                }

                showResult('success', `恭喜！成功兑换 ${prizeUpdates.length} 件奖品，消耗 ${totalPoints} 积分。请到指定地点领取奖品。`);

                // 立即更新本地库存数据并刷新页面显示
                for (const { idx, quantity } of prizeUpdates) {
                    const prize = prizeList[idx];
                    prize.fields['已兑数量'] = (parseInt(prize.fields['已兑数量']) || 0) + quantity;
                    // 立即更新页面上的库存显示
                    const stock = (prize.fields['库存数量'] || 0) - (prize.fields['已兑数量'] || 0);
                    const metaEl = document.querySelector(`#prize-${idx} .prize-meta`);
                    if (metaEl) {
                        metaEl.textContent = `剩余 ${stock} 件`;
                    }
                    // 如果库存变为0，禁用该选项
                    if (stock <= 0) {
                        const checkbox = document.querySelector(`#prize-${idx} input[type="checkbox"]`);
                        if (checkbox && checkbox.checked) {
                            checkbox.checked = false;
                            delete selectedPrizes[idx];
                            document.getElementById('qty-controls-' + idx).style.display = 'none';
                            document.getElementById('prize-' + idx).classList.remove('selected');
                        }
                        checkbox.disabled = true;
                        document.getElementById('prize-' + idx).classList.add('disabled');
                    }
                }

                // 清空已选
                selectedPrizes = {};

                // 更新本地积分数据
                currentUserRecord.fields['兑换消耗积分'] = newExchangePoints;

                // 计算新的当前可用积分
                const newAvailablePoints = parseInt(currentUserRecord.fields['累计总积分'] || 0) - newExchangePoints;
                document.getElementById('availablePoints').textContent = newAvailablePoints;
                currentUserRecord.fields['当前可用积分'] = newAvailablePoints;

                // 重新加载奖品列表以反映最新库存
                await loadPrizeList(newAvailablePoints);

            } catch (error) {
                showResult('error', error.message);
                btn.disabled = false;
                updateCartUI();
            }
        }

        // 显示结果
        function showResult(type, message) {
            const resultDiv = document.getElementById('resultMessage');
            resultDiv.className = 'result ' + type;
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('querySection').style.display = 'block';
            alert(message);
        }

        // 重置页面
        function resetPage() {
            document.getElementById('userName').value = '';
            document.getElementById('phoneLast4').value = '';
            document.getElementById('querySection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('resultMessage').style.display = 'none';
            selectedPrizes = {};
            currentUserRecord = null;
        }

        init();
    </script>
</body>
</html>
