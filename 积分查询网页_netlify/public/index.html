<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑百校-奖品兑换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            margin-top: 10px;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .info-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-item .label {
            color: #999;
        }
        .info-item .value {
            font-weight: 600;
            color: #333;
        }
        .info-item .value.highlight {
            color: #667eea;
            font-size: 20px;
        }
        .prize-list {
            margin: 20px 0;
        }
        .prize-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .prize-item:hover {
            border-color: #667eea;
        }
        .prize-item.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        .prize-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .prize-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            accent-color: #667eea;
        }
        .prize-info {
            flex: 1;
        }
        .prize-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .prize-meta {
            font-size: 12px;
            color: #999;
        }
        .prize-points {
            font-weight: 600;
            color: #667eea;
        }
        .prize-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .prize-image:hover {
            transform: scale(1.05);
        }
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .image-modal.show {
            display: flex;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .image-modal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
        }
        .prize-quantity {
            display: flex;
            align-items: center;
            margin-left: 15px;
        }
        .prize-quantity button {
            width: 28px;
            height: 28px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .prize-quantity button:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }
        .prize-quantity button:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
        }
        .prize-quantity span {
            min-width: 30px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0 8px;
        }
        .cart-summary {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .cart-summary h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item-name {
            color: #666;
        }
        .cart-item-subtotal {
            color: #667eea;
            font-weight: 600;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            padding-top: 10px;
            margin-top: 10px;
            border-top: 2px solid #ddd;
            font-size: 16px;
            font-weight: 600;
        }
        .cart-total-points {
            color: #667eea;
        }
        .cart-insufficient {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        .result {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎁 跑百校-奖品兑换</h1>
            <p>用积分兑换心仪奖品</p>
        </div>
        <div class="content">
            <div id="querySection">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="userName" placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>手机后四位</label>
                    <input type="text" id="phoneLast4" placeholder="请输入手机号后四位" maxlength="4">
                </div>
                <button class="btn btn-primary" onclick="queryPoints()">查询积分</button>
            </div>

            <div id="loadingSection" class="loading" style="display: none;">
                <p>加载中...</p>
            </div>

            <div id="resultSection" style="display: none;">
                <div class="info-card">
                    <h3>📊 我的积分</h3>
                    <div class="info-item">
                        <span class="label">总积分</span>
                        <span class="value" id="totalPoints">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">已使用积分</span>
                        <span class="value" id="usedPoints">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">剩余可用积分</span>
                        <span class="value highlight" id="availablePoints">-</span>
                    </div>
                </div>

                <div class="prize-list">
                    <h3 style="margin-bottom: 15px; color: #333;">🎁 可兑换奖品（可多选）</h3>
                    <div id="prizeItems"></div>
                </div>

                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <h4>🛒 已选奖品</h4>
                    <div id="cartItems"></div>
                    <div class="cart-total">
                        <span>合计消耗</span>
                        <span class="cart-total-points" id="cartTotalPoints">0 积分</span>
                    </div>
                    <div id="cartHint" class="cart-insufficient" style="display: none;"></div>
                </div>

                <button class="btn btn-primary" id="redeemBtn" onclick="redeemPrize()" disabled>请选择奖品</button>
                <div class="result" id="resultMessage"></div>
            </div>

            <button class="btn btn-secondary" id="resetBtn" style="display: none;" onclick="resetPage()">重新查询</button>
        </div>
    </div>

    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <span class="close-btn">&times;</span>
        <img id="modalImage" src="" alt="奖品图片">
    </div>

    <script>
        let currentUserRecord = null;
        let prizeList = [];
        let selectedPrizes = {};

        // 模拟用户数据
        const mockUserData = {
            "张三123": {total: 1200, used: 200, left: 1000},
            "李四": {total: 800, used: 100, left: 700}
        }

        // 模拟奖品数据
        const mockPrize = [
            {name:"跑百校定制贴纸",points:100,stock:50},
            {name:"跑百校定制冰箱贴",points:200,stock:30},
            {name:"PEGASUS 42冷感毛巾",points:500,stock:15}
        ]

        // 点击查询 纯本地模拟
        async function queryPoints(){
            let name = document.getElementById('userName').value.trim();
            let phone = document.getElementById('phoneLast4').value.trim();
            if(!name || !phone){
                alert("请填写完整信息");
                return;
            }
            document.getElementById('querySection').style.display='none';
            document.getElementById('loadingSection').style.display='block';

            // 模拟延迟
            await new Promise(res=>setTimeout(res,800));

            // 匹配模拟数据
            let userInfo = mockUserData[name];
            if(!userInfo){
                alert("暂无该测试用户，请输入：张三123 / 李四");
                resetPage();
                return;
            }

            currentUserRecord = {
                fields:{
                    总积分:userInfo.total,
                    已使用积分:userInfo.used,
                    剩余可用积分:userInfo.left
                }
            }

            document.getElementById('totalPoints').innerText = userInfo.total;
            document.getElementById('usedPoints').innerText = userInfo.used;
            document.getElementById('availablePoints').innerText = userInfo.left;

            loadPrizeList(userInfo.left);

            document.getElementById('loadingSection').style.display='none';
            document.getElementById('resultSection').style.display='block';
            document.getElementById('resetBtn').style.display='block';
        }

        // 加载奖品
        function loadPrizeList(userPoints){
            prizeList = mockPrize;
            let html = "";
            prizeList.forEach((item,idx)=>{
                let able = userPoints >= item.points;
                html += `
                <div class="prize-item ${able?'':'disabled'}" id="prize-${idx}">
                    <input type="checkbox" value="${idx}" ${able?'':'disabled'} onclick="togglePrize(${idx})">
                    <div class="prize-info">
                        <div class="prize-name">${item.name}</div>
                        <div class="prize-meta">剩余 ${item.stock} 件</div>
                    </div>
                    <div class="prize-points">${item.points} 积分</div>
                    <div class="prize-quantity" id="qty-${idx}" style="display:none">
                        <button onclick="changeQuantity(${idx},-1)">−</button>
                        <span id="num-${idx}">1</span>
                        <button onclick="changeQuantity(${idx},1)">+</button>
                    </div>
                </div>
                `
            })
            document.getElementById('prizeItems').innerHTML = html;
            updateCartUI();
        }

        function togglePrize(idx){
            let ck = document.querySelector(`input[value="${idx}"]`).checked;
            if(ck){
                selectedPrizes[idx] = 1;
                document.getElementById(`qty-${idx}`).style.display="flex";
                document.getElementById(`prize-${idx}`).classList.add("selected");
            }else{
                delete selectedPrizes[idx];
                document.getElementById(`qty-${idx}`).style.display="none";
                document.getElementById(`prize-${idx}`).classList.remove("selected");
            }
            updateCartUI();
        }

        function changeQuantity(idx,delta){
            let maxNum = prizeList[idx].stock;
            let now = selectedPrizes[idx] || 1;
            now += delta;
            if(now<1)now=1;
            if(now>maxNum)now=maxNum;
            selectedPrizes[idx] = now;
            document.getElementById(`num-${idx}`).innerText = now;
            updateCartUI();
        }

        // 购物车计算
        function updateCartUI(){
            let keys = Object.keys(selectedPrizes);
            let cartBox = document.getElementById('cartSummary');
            let redeemBtn = document.getElementById('redeemBtn');
            let cartHint = document.getElementById('cartHint');
            if(keys.length===0){
                cartBox.style.display="none";
                redeemBtn.disabled=true;
                redeemBtn.innerText="请选择奖品";
                return;
            }
            cartBox.style.display="block";
            let total = 0;
            let cartHtml = "";
            keys.forEach(k=>{
                let p = prizeList[k];
                let n = selectedPrizes[k];
                let sub = p.points * n;
                total += sub;
                cartHtml += `<div class="cart-item"><span class="cart-item-name">${p.name} ×${n}</span><span class="cart-item-subtotal">${sub}积分</span></div>`
            })
            document.getElementById('cartItems').innerHTML = cartHtml;
            document.getElementById('cartTotalPoints').innerText = total+" 积分";

            let left = currentUserRecord.fields.剩余可用积分;
            if(total>left){
                cartHint.style.display="block";
                cartHint.innerText=`积分不足，可用${left}积分`;
                redeemBtn.disabled=true;
                redeemBtn.innerText="积分不足";
            }else{
                cartHint.style.display="none";
                redeemBtn.disabled=false;
                redeemBtn.innerText=`确认兑换(${total}积分)`;
            }
        }

        // 模拟兑换
        function redeemPrize(){
            showResult("success","兑换成功，模拟提交完成！");
        }

        function showResult(type,msg){
            let box = document.getElementById('resultMessage');
            box.className = `result ${type}`;
            box.innerText = msg;
            box.style.display="block";
            setTimeout(()=>box.style.display="none",2500)
        }

        function resetPage(){
            document.getElementById('userName').value="";
            document.getElementById('phoneLast4').value="";
            document.getElementById('querySection').style.display="block";
            document.getElementById('resultSection').style.display="none";
            document.getElementById('resetBtn').style.display="none";
            selectedPrizes={};
            currentUserRecord=null;
        }

        function showImageModal(s){
            document.getElementById('modalImage').src=s;
            document.getElementById('imageModal').classList.add('show');
        }
        function closeImageModal(){
            document.getElementById('imageModal').classList.remove('show');
        }
    </script>
</body>
</html>
